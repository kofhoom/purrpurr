      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "GA", sans-serif;
        /* background: linear-gradient(
          135deg,
          #fce4ec 0%,
          #e8f4f8 50%,
          #f3e5f5 100%
        ); */
        /* height: 100vh; */
        /* height: 100dvh; */
        display: flex;
        flex-direction: column;
        align-items: center;
        /* overflow: hidden; */
        user-select: none;
        -webkit-user-select: none;
      }

      .info_box {
        height: 48px;
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .info_box_content {
        font-size: 20px;
        text-align: center;
      }
      #sticker-panel {
        width: 100%;
        max-width: 500px;
        background: rgba(255, 255, 255, 0.88);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        /* border-bottom: 1px solid rgba(220, 170, 220, 0.35); */
        padding: 8px 0 6px;
        flex-shrink: 0;
        z-index: 100;
      }

      #sticker-scroll {
        display: flex;
        flex-direction: row;
        overflow-x: auto;
        overflow-y: hidden;
        gap: 8px;
        padding: 2px 12px 4px;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        cursor: grab;
      }
      #sticker-scroll::-webkit-scrollbar {
        display: none;
      }
      #sticker-scroll.grabbing {
        cursor: grabbing;
      }

      .sticker-thumb {
        flex-shrink: 0;
        width: 66px;
        height: 66px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.7);
        /* border: 1.5px solid rgba(220, 170, 220, 0.3); */
        transition:
          transform 0.15s,
          box-shadow 0.15s,
          border-color 0.15s;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }
      .sticker-thumb:active,
      .sticker-thumb.active {
        transform: scale(0.9);
        border-color: rgba(180, 100, 220, 0.7);
        box-shadow: 0 0 0 2px rgba(180, 100, 220, 0.35);
      }
      .sticker-thumb img {
        max-width: 56px;
        max-height: 56px;
        object-fit: contain;
        pointer-events: none;
        -webkit-user-drag: none;
        -webkit-touch-callout: none;
      }

      #canvas-area {
        flex: 1;
        width: 100%;
        max-width: 500px;
        display: flex;
        align-items: center;
        justify-content: center;
        /* overflow: hidden; */
        position: relative;
        /* padding: 8px; */
      }

      #main-canvas {
        position: relative;
        z-index: 10;
        /* filter: drop-shadow(0 12px 40px rgba(0, 0, 0, 0.18)); */
        /* border-radius: 14px; */
        overflow: hidden;
        flex-shrink: 0;
        transition: box-shadow 0.2s ease;
        /* background-color: #fffff0; */
        height: 100%;
        width: 100%;
        /* padding: 10px; */
        /* border-radius: 10px; */
      }

      #main-canvas .main-background-image {
        width: 100%;
        /* height: 100%; */
        display: block;
        /* margin: 0 auto; */
        border: 1px solid #ecb7ff;
      }
      #main-canvas.drag-over {
        box-shadow:
          0 0 0 4px rgba(160, 100, 255, 0.7),
          inset 0 0 30px rgba(160, 100, 255, 0.12);
      }

      #main-img {
        display: block;
        max-width: 100%;
        max-height: calc(100vh - 162px);
        max-height: calc(100dvh - 162px);
        width: auto;
        height: auto;
        border-radius: 14px;
        pointer-events: none;
        -webkit-user-drag: none;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
      }

      #sticker-layer {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 20;
        pointer-events: none;
        border-radius: 14px;
        /* background-color: #fffff7; */
      }

      .placed-sticker {
        position: absolute;
        pointer-events: all;
        cursor: grab;
        transform-origin: center center;
        touch-action: none;
      }
      .placed-sticker.dragging {
        cursor: grabbing;
        z-index: 999 !important;
      }
      .placed-sticker img {
        display: block;
        pointer-events: none;
        -webkit-user-drag: none;
        -webkit-touch-callout: none;
        background: transparent;
      }
      .placed-sticker.selected {
        outline: 2px dashed rgba(160, 100, 255, 0.75);
        outline-offset: 3px;
        border-radius: 4px;
      }

      /* 삭제 버튼 */
      .delete-btn {
        position: absolute;
        top: -10px;
        right: -32px;
        width: 24px;
        height: 24px;
        background: rgba(255, 60, 60, 0.95);
        color: #fff;
        border-radius: 50%;
        display: none;
        align-items: center;
        justify-content: center;
        font-size: 15px;
        font-weight: bold;
        line-height: 1;
        cursor: pointer;
        z-index: 30;
        border: 2px solid #fff;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.28);
        -webkit-tap-highlight-color: transparent;
      }
      .placed-sticker.selected .delete-btn {
        display: flex;
      }

      #ghost {
        position: fixed;
        pointer-events: none;
        z-index: 9999;
        opacity: 0.82;
        display: none;
        transform: translate(-50%, -50%) scale(1.1);
      }
      #ghost img {
        width: 80px;
        height: 80px;
        object-fit: contain;
        pointer-events: none;
        -webkit-user-drag: none;
        -webkit-touch-callout: none;
      }

      #bottom-bar {
        width: 100%;
        max-width: 500px;
        padding: 20px;
        display: flex;
        justify-content: center;
        background: transparent;
        backdrop-filter: blur(12px);
        flex-shrink: 0;
        -webkit-backdrop-filter: blur(12px);
        flex-shrink: 0;
      }

      #complete-btn {
        font-family: "GA", sans-serif;
        width: 39%;
        max-width: 320px;
        padding: 5px 0;
        background: #ffcbe7;
        color: #ffffff;
        font-size: 20px;
        /* font-weight: 700; */
        border: 1px solid #ecb7ff;
        border-radius: 10px;
        cursor: pointer;
        letter-spacing: 0.5px;
        /* box-shadow: 0 4px 20px rgba(200, 100, 180, 0.4); */
        transition:
          transform 0.15s,
          box-shadow 0.15s;
        -webkit-tap-highlight-color: transparent;
      }
      #complete-btn:active {
        transform: scale(0.97);
        box-shadow: 0 2px 10px rgba(200, 100, 180, 0.3);
      }

      @keyframes stickPop {
        0% {
          transform: scale(1.4) rotate(var(--r, 0deg));
        }
        55% {
          transform: scale(0.88) rotate(var(--r, 0deg));
        }
        75% {
          transform: scale(1.06) rotate(var(--r, 0deg));
        }
        100% {
          transform: scale(1) rotate(var(--r, 0deg));
        }
      }
      .stick-pop {
        animation: stickPop 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97) forwards;
      }

      .sparkle {
        position: fixed;
        pointer-events: none;
        z-index: 9999;
        font-size: 20px;
        animation: sparkleAnim 0.7s ease-out forwards;
      }
      @keyframes sparkleAnim {
        0% {
          opacity: 1;
          transform: scale(0) rotate(0deg) translate(0, 0);
        }
        60% {
          opacity: 1;
          transform: scale(1.6) rotate(200deg) translate(var(--tx), var(--ty));
        }
        100% {
          opacity: 0;
          transform: scale(0.5) rotate(360deg) translate(var(--tx2), var(--ty2));
        }
      }

      img {
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
      }

      .co-info-box {
        font-size: 10px;
        text-align: center !important;
        width: 100%;
        display: inline-block;
        padding: 10px;
        font-family: sans-serif;
      }
    </style>

      // 배경 이미지 비율로 캔버스 높이 고정
      // (function fixAspectRatio() {
      //   const bgEl = mainCanvas.querySelector(".main-background-image");
      //   function setHeight() {
      //     if (bgEl.naturalWidth) {
      //       mainCanvas.style.height =
      //         (mainCanvas.offsetWidth * bgEl.naturalHeight) /
      //           bgEl.naturalWidth +
      //         "px";
      //     }
      //   }
      //   if (bgEl.complete && bgEl.naturalWidth) setHeight();
      //   else bgEl.addEventListener("load", setHeight);
      //   window.addEventListener("resize", setHeight);
      // })();

      // 텍스트 입력 버튼 (스티커 목록 첫번째)
      const textThumb = document.createElement("div");
      textThumb.className = "sticker-thumb";
      textThumb.style.cssText =
        "font-size: 21px; color: rgb(157 216 255); justify-content: center; align-items: center; flex-direction: column; gap: 2px; line-height: 0.7; background: #ffe9f9a3; border-radius: 50%; border: 1px solid #ecb7ff;";
      textThumb.innerHTML = `<span style="font-size: 28px;position: relative;top: 5px;">TEXT</span><span style="font-size: 28px;position: relative;top: 5px;">텍스트</span>`;
      textThumb.addEventListener("pointerdown", (e) => {
        e.stopPropagation();
        placeTextSticker();
      });
      stickerScroll.prepend(textThumb);

      STICKERS.forEach(({ src, size }, index) => {
        const thumb = document.createElement("div");
        thumb.className = "sticker-thumb";
        thumb.dataset.src = src;
        thumb.dataset.size = size;

        const img = document.createElement("img");
        img.src = src;
        img.draggable = false;

        let last4lenght = STICKERS.length - 4;
        if (index >= last4lenght) {
          img.style.width = "25px";
          img.style.height = "25px";
        }
        if (index >= STICKERS.length - 8 && index <= STICKERS.length - 5) {
          img.style.width = "40px";
          img.style.height = "40px";
        }

        thumb.appendChild(img);
        stickerScroll.appendChild(thumb);

        thumb.addEventListener(
          "touchstart",
          (e) => onThumbTouchStart(e, src, size),
          { passive: true },
        );
      });

      let panelDrag = null;

      function showGhost(src, x, y) {
        ghostImg.src = src;
        ghost.style.display = "block";
        moveGhost(x, y);
      }
      function moveGhost(x, y) {
        ghost.style.left = x + "px";
        ghost.style.top = y + "px";
      }
      function hideGhost() {
        ghost.style.display = "none";
        mainCanvas.classList.remove("drag-over");
        panelDrag = null;
      }
      function isOverCanvas(x, y) {
        const r = mainCanvas.getBoundingClientRect();
        return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
      }

      function onThumbTouchStart(e, src, size) {
        const t = e.touches[0];
        panelDrag = {
          src,
          size,
          startX: t.clientX,
          startY: t.clientY,
          active: false,
        };
      }

      document.addEventListener(
        "touchmove",
        (e) => {
          if (!panelDrag) return;
          const t = e.touches[0];
          const dy = t.clientY - panelDrag.startY;
          if (!panelDrag.active && dy > 18) {
            panelDrag.active = true;
            showGhost(panelDrag.src, t.clientX, t.clientY);
          }
          if (panelDrag.active) {
            e.preventDefault();
            moveGhost(t.clientX, t.clientY);
            mainCanvas.classList.toggle(
              "drag-over",
              isOverCanvas(t.clientX, t.clientY),
            );
          }
        },
        { passive: false },
      );

      document.addEventListener("touchend", (e) => {
        if (!panelDrag) return;
        if (panelDrag.active) {
          const t = e.changedTouches[0];
          if (isOverCanvas(t.clientX, t.clientY)) {
            placeSticker(panelDrag.src, panelDrag.size);
            // spawnSparkles(t.clientX, t.clientY);
          }
          hideGhost();
        } else {
          panelDrag = null;
        }
      });

      stickerScroll.addEventListener("mousedown", (e) => {
        e.preventDefault();
        const startX = e.clientX;
        const startY = e.clientY;
        const baseScroll = stickerScroll.scrollLeft;
        const thumb = e.target.closest(".sticker-thumb");
        const src = thumb ? thumb.dataset.src : null;
        const size = thumb ? parseInt(thumb.dataset.size) : 0;
        let mode = null; // null | 'scroll' | 'ghost'

        stickerScroll.classList.add("grabbing");

        function onMove(ev) {
          const dx = ev.clientX - startX;
          const dy = ev.clientY - startY;

          if (!mode) {
            if (
              Math.abs(dx) > Math.abs(dy) ||
              (Math.abs(dx) < 4 && Math.abs(dy) < 4)
            ) {
              mode = "scroll";
            } else if (dy > 10) {
              mode = "ghost";
            }
          }

          if (mode === "scroll") {
            stickerScroll.scrollLeft = baseScroll - dx;
          } else if (mode === "ghost" && src) {
            if (!panelDrag || !panelDrag.active) {
              showGhost(src, ev.clientX, ev.clientY);
              panelDrag = { src, size, active: true };
            }
            moveGhost(ev.clientX, ev.clientY);
            mainCanvas.classList.toggle(
              "drag-over",
              isOverCanvas(ev.clientX, ev.clientY),
            );
          }
        }

        function onUp(ev) {
          stickerScroll.classList.remove("grabbing");
          const dx = ev.clientX - startX;
          const dy = ev.clientY - startY;

          if (mode === "ghost" && panelDrag && panelDrag.active) {
            if (isOverCanvas(ev.clientX, ev.clientY)) {
              placeSticker(src, size);
              // spawnSparkles(ev.clientX, ev.clientY);
            }
            hideGhost();
          } else if (Math.abs(dx) < 5 && Math.abs(dy) < 5 && src) {
            // 클릭: 캔버스 중앙에 배치
            const r = mainCanvas.getBoundingClientRect();
            placeSticker(src, size);
            // spawnSparkles(r.left + r.width / 2, r.top + r.height / 2);
          }
          document.removeEventListener("mousemove", onMove);
        }

        document.addEventListener("mousemove", onMove);
        document.addEventListener("mouseup", onUp, { once: true });
      });

      function placeSticker(src, size) {
        const r = mainCanvas.getBoundingClientRect();
        const isFirst = src === "image/1.png";
        const w = isFirst ? size / 2 : size;
        const cx = r.width / 2 - w / 2;
        const cy = r.height * 0.05;

        const el = document.createElement("div");
        el.className = "placed-sticker stick-pop";
        el.style.cssText = `left:${cx}px;top:${cy}px;width:${w}px;height:${size}px;--r:0deg;z-index:20;`;

        const img = document.createElement("img");
        img.src = src;
        img.style.cssText = `width:${w}px;height:${size}px;object-fit:contain;`;
        img.draggable = false;
        el.appendChild(img);

        const del = document.createElement("div");
        del.className = "delete-btn";
        del.innerHTML = "&times;";
        del.addEventListener("pointerdown", (ev) => {
          ev.stopPropagation();
          ev.preventDefault();
          if (selectedSticker === el) selectedSticker = null;
          el.remove();
        });
        el.appendChild(del);

        stickerLayer.appendChild(el);
        el.addEventListener(
          "animationend",
          () => el.classList.remove("stick-pop"),
          { once: true },
        );

        el.addEventListener("pointerdown", (ev) => {
          if (ev.target === del) return;
          ev.stopPropagation();
          ev.preventDefault();
          selectSticker(el);
          startStickerDrag(el, ev.clientX, ev.clientY);
        });
      }

      function placeTextSticker() {
        const r = mainCanvas.getBoundingClientRect();
        const el = document.createElement("div");
        el.className = "placed-sticker stick-pop";
        el.style.cssText = `left:${r.width * 0.1}px;top:${r.height * 0.45}px;width:auto;height:auto;min-width:80px;--r:0deg;z-index:999;padding:4px 8px;white-space:pre-wrap;`;
        el.dataset.isText = "true";

        const editable = document.createElement("div");
        editable.contentEditable = "true";
        editable.style.cssText =
          "font-size:20px;color:rgb(104, 104, 104);outline:none;min-width:60px;min-height:1em;cursor:text;user-select:text;";
        editable.setAttribute("placeholder", "텍스트 입력...");
        el.appendChild(editable);

        const del = document.createElement("div");
        del.className = "delete-btn";
        del.innerHTML = "&times;";
        del.addEventListener("pointerdown", (ev) => {
          ev.stopPropagation();
          ev.preventDefault();
          if (selectedSticker === el) selectedSticker = null;
          el.remove();
        });
        el.appendChild(del);

        stickerLayer.appendChild(el);
        el.addEventListener(
          "animationend",
          () => el.classList.remove("stick-pop"),
          { once: true },
        );

        function enterEditMode() {
          editable.contentEditable = "true";
          editable.style.cursor = "text";
          el.style.cursor = "text";
          setTimeout(() => editable.focus(), 10);
        }
        function exitEditMode() {
          editable.contentEditable = "false";
          editable.style.cursor = "grab";
          el.style.cursor = "grab";
        }

        editable.addEventListener("blur", () => {
          if (!editable.textContent.trim()) {
            el.remove();
            return;
          }
          exitEditMode();
        });

        el.addEventListener("dblclick", (ev) => {
          ev.stopPropagation();
          enterEditMode();
        });

        // 모바일 더블탭으로 재편집
        let lastTap = 0;
        el.addEventListener("touchend", (ev) => {
          if (ev.target === del) return;
          if (editable.contentEditable === "true") return;
          const now = Date.now();
          if (now - lastTap < 350) {
            ev.preventDefault();
            enterEditMode();
          }
          lastTap = now;
        });

        el.addEventListener("pointerdown", (ev) => {
          if (ev.target === del) return;
          if (editable.contentEditable === "true") {
            ev.stopPropagation();
            return;
          }
          ev.stopPropagation();
          ev.preventDefault();
          selectSticker(el);
          startStickerDrag(el, ev.clientX, ev.clientY);
        });

        editable.focus();
      }

      function placeCustomSticker(src, w, h) {
        const r = mainCanvas.getBoundingClientRect();
        const cx = r.width / 2 - w / 2;
        const cy = r.height / 2 - h / 2;

        const el = document.createElement("div");
        el.className = "placed-sticker stick-pop";
        el.style.cssText = `left:${cx}px;top:${cy}px;width:${w}px;height:${h}px;--r:0deg;z-index:20;`;

        const img = document.createElement("img");
        img.src = src;
        img.style.cssText = `width:${w}px;height:${h}px;object-fit:contain;`;
        img.draggable = false;
        el.appendChild(img);

        const del = document.createElement("div");
        del.className = "delete-btn";
        del.innerHTML = "&times;";
        del.addEventListener("pointerdown", (ev) => {
          ev.stopPropagation();
          ev.preventDefault();
          if (selectedSticker === el) selectedSticker = null;
          el.remove();
        });
        el.appendChild(del);

        stickerLayer.appendChild(el);
        el.addEventListener(
          "animationend",
          () => el.classList.remove("stick-pop"),
          { once: true },
        );
        el.addEventListener("pointerdown", (ev) => {
          if (ev.target === del) return;
          ev.stopPropagation();
          ev.preventDefault();
          selectSticker(el);
          startStickerDrag(el, ev.clientX, ev.clientY);
        });
      }

      let selectedSticker = null;
      function selectSticker(el) {
        if (selectedSticker && selectedSticker !== el) {
          selectedSticker.classList.remove("selected");
        }
        el.classList.add("selected");
        selectedSticker = el;
      }

      mainCanvas.addEventListener("pointerdown", (e) => {
        const mainImg = document.getElementById("main-img");
        if (e.target === mainCanvas || e.target === mainImg) {
          if (selectedSticker) {
            selectedSticker.classList.remove("selected");
            selectedSticker = null;
          }
        }
      });

      function startStickerDrag(el, startX, startY) {
        const origLeft = parseFloat(el.style.left) || 0;
        const origTop = parseFloat(el.style.top) || 0;

        el.classList.add("dragging");
        el.style.zIndex = 500;

        function onMove(ev) {
          ev.preventDefault();
          const dx = ev.clientX - startX;
          const dy = ev.clientY - startY;
          const r = mainCanvas.getBoundingClientRect();
          const w = el.offsetWidth;
          const h = el.offsetHeight;
          const nx = Math.max(
            -w * 0.3,
            Math.min(r.width - w * 0.7, origLeft + dx),
          );
          const ny = Math.max(
            -h * 0.3,
            Math.min(r.height - h * 0.7, origTop + dy),
          );
          el.style.left = nx + "px";
          el.style.top = ny + "px";
        }
        function onUp() {
          el.classList.remove("dragging");
          el.style.zIndex = 20;
          document.removeEventListener("pointermove", onMove);
          document.removeEventListener("pointerup", onUp);
        }
        document.addEventListener("pointermove", onMove, { passive: false });
        document.addEventListener("pointerup", onUp, { once: true });
      }

      // function spawnSparkles(cx, cy) {
      //   const emojis = ["✨", "⭐", "💫", "🌟", "🩷"];
      //   for (let i = 0; i < 6; i++) {
      //     const s = document.createElement("div");
      //     s.className = "sparkle";
      //     const angle = Math.random() * Math.PI * 2;
      //     const dist = 30 + Math.random() * 50;
      //     const dist2 = dist + 20 + Math.random() * 30;
      //     s.style.cssText =
      //       `left:${cx}px;top:${cy}px;` +
      //       `--tx:${Math.cos(angle) * dist}px;--ty:${
      //         Math.sin(angle) * dist
      //       }px;` +
      //       `--tx2:${Math.cos(angle) * dist2}px;--ty2:${
      //         Math.sin(angle) * dist2
      //       }px;` +
      //       `animation-delay:${Math.random() * 0.2}s;font-size:${
      //         16 + Math.random() * 12
      //       }px;`;
      //     s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      //     document.body.appendChild(s);
      //     s.addEventListener("animationend", () => s.remove());
      //   }
      // }

      completeBtn.addEventListener("click", async () => {
        if (selectedSticker) {
          selectedSticker.classList.remove("selected");
          selectedSticker = null;
        }
        await captureAndShare();
      });

      async function captureAndShare() {
        const rect = mainCanvas.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        const outW = Math.round(rect.width * dpr);
        const outH = Math.round(rect.height * dpr);

        const offscreen = document.createElement("canvas");
        offscreen.width = outW;
        offscreen.height = outH;
        const ctx = offscreen.getContext("2d");
        ctx.scale(dpr, dpr);

        // 배경색
        const bgColor = getComputedStyle(mainCanvas).backgroundColor;
        ctx.fillStyle = bgColor || "#fffff0";
        ctx.fillRect(0, 0, rect.width, rect.height);

        // 배경 이미지 (화면에 보이는 그대로 cover)
        await new Promise((res) => {
          const bgImgEl = mainCanvas.querySelector(".main-background-image");
          if (!bgImgEl) {
            res();
            return;
          }
          const bi = new Image();
          bi.onload = () => {
            const iw = bi.naturalWidth,
              ih = bi.naturalHeight;
            const scale = Math.max(rect.width / iw, rect.height / ih);
            const dw = iw * scale,
              dh = ih * scale;
            ctx.drawImage(
              bi,
              (rect.width - dw) / 2,
              (rect.height - dh) / 2,
              dw,
              dh,
            );
            res();
          };
          bi.onerror = res;
          bi.src = bgImgEl.src;
        });

        // 배경 이미지 보더
        const bgBorderEl = mainCanvas.querySelector(".main-background-image");
        if (bgBorderEl) {
          const bgStyle = getComputedStyle(bgBorderEl);
          const bw = parseFloat(bgStyle.borderWidth) || 1;
          ctx.strokeStyle = bgStyle.borderColor || "#ecb7ff";
          ctx.lineWidth = bw;
          ctx.strokeRect(bw / 2, bw / 2, rect.width - bw, rect.height - bw);
        }

        const placed = Array.from(
          stickerLayer.querySelectorAll(".placed-sticker"),
        );
        await Promise.all(
          placed.map(
            (ps) =>
              new Promise((res) => {
                const l = parseFloat(ps.style.left) || 0;
                const t = parseFloat(ps.style.top) || 0;
                const w = ps.offsetWidth;
                const h = ps.offsetHeight;

                if (ps.dataset.isText) {
                  const editable = ps.querySelector("[contenteditable]");
                  const text = editable
                    ? (editable.innerText || editable.textContent || "").trim()
                    : "";
                  if (text) {
                    const style = getComputedStyle(editable);
                    const fontSize = parseFloat(style.fontSize);
                    const lineHeight = fontSize * 1.3;
                    ctx.save();
                    ctx.font =
                      style.fontWeight +
                      " " +
                      fontSize +
                      "px " +
                      style.fontFamily;
                    ctx.fillStyle = style.color || "#333";
                    ctx.textBaseline = "top";
                    text.split("\n").forEach((line, i) => {
                      ctx.fillText(line, l + 8, t + 4 + i * lineHeight);
                    });
                    ctx.restore();
                  }
                  res();
                  return;
                }

                const pImg = ps.querySelector("img");
                if (!pImg) {
                  res();
                  return;
                }
                const si = new Image();
                si.onload = () => {
                  const iw = si.naturalWidth,
                    ih = si.naturalHeight;
                  if (iw === 0 || ih === 0) {
                    ctx.drawImage(si, l, t, w, h);
                    res();
                    return;
                  }
                  const scale = Math.min(w / iw, h / ih);
                  const dw = iw * scale,
                    dh = ih * scale;
                  ctx.drawImage(si, l + (w - dw) / 2, t + (h - dh) / 2, dw, dh);
                  res();
                };
                si.onerror = res;
                si.src = pImg.src;
              }),
          ),
        );

        offscreen.toBlob(async (blob) => {
          const file = new File(
            [blob],
            "[푸르푸르] ✩ Dreamy Dream 스티커북 이벤트 ✩.png",
            {
              type: "image/png",
            },
          );
          if (
            navigator.share &&
            navigator.canShare &&
            navigator.canShare({ files: [file] })
          ) {
            try {
              await navigator.share({
                files: [file],
                title:
                  "[푸르푸르] ✩ Dreamy Dream 스티커북 이벤트 ✩\nhttps://www.instagram.com/purr.purr.rrrr?igsh=MXIzbGU0NTQ5ZmZrcw==",
              });
            } catch (e) {
              if (e.name !== "AbortError") fallbackDownload(blob);
            }
          } else {
            fallbackDownload(blob);
          }
        }, "image/png");
      }

      function fallbackDownload(blob) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "[푸르푸르] ✩ Dreamy Dream 스티커북 이벤트 ✩.png";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      }
    </script>
  </body>
